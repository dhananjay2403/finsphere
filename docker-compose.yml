# Local dev stack — frontend (Vite) + backend (nodemon) + MongoDB + Redis. `docker compose up` and go.
# Prefer Atlas over the local Mongo container? Just swap MONGO_URI in backend/.env — the mongo service stays unused.

services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Always the compose network's redis service (no Atlas-style alternative to worry about).
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_started
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      # The browser (not the frontend container) makes this request, so it must be host-reachable.
      VITE_API_URL: http://localhost:5001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    # Trade execution uses mongoose session transactions, which need a replica set — plain mongod rejects them.
    command: ["--replSet", "rs0"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # config/db.js exits on a failed initial connection, so wait for an actual PRIMARY, not just a started container.
      test: >
        mongosh --quiet --eval
        "try { quit(rs.status().members.some(m => m.stateStr === 'PRIMARY') ? 0 : 1) }
        catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]}); quit(1) }"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No ports published — only the backend reaches this, over the internal compose network.
    restart: unless-stopped

volumes:
  mongo-data:

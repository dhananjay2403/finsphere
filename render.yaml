services:
  - type: web
    name: finsphere-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # The following secrets must be set in the Render dashboard:
      # MONGO_URI       — your MongoDB Atlas connection string
      # JWT_SECRET      — long random string (32+ chars)
      # JWT_EXPIRE      — e.g. 30d
      # FINNHUB_API_KEY — your Finnhub API key
      # CORS_ORIGIN     — the deployed frontend URL (e.g. https://finsphere.vercel.app)
      # REDIS_URL       — optional; a hosted Redis connection string (Render Key Value,
      #                   Upstash, Redis Cloud, etc). Caching is skipped gracefully if unset.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: FINNHUB_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
